<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faceorbit</title>
  <meta name="description" content="Faceorbit — Facial Structure Tracking App">
  <link rel="alternate" hreflang="zh-TW" href="/zh/">
  <link rel="alternate" hreflang="en" href="/en/">
  <link rel="alternate" hreflang="ja" href="/ja/">
  <link rel="alternate" hreflang="ko" href="/ko/">
  <link rel="alternate" hreflang="x-default" href="/en/">
  <style>
    body { margin: 0; background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #7B9EFF; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  </style>
</head>
<body>
  <div class="dot"></div>
  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (lang.startsWith('zh')) {
        window.location.replace('/zh/');
      } else if (lang.startsWith('ja')) {
        window.location.replace('/ja/');
      } else if (lang.startsWith('ko')) {
        window.location.replace('/ko/');
      } else {
        window.location.replace('/en/');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/en/">
  </noscript>
</body>
</html>
